<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comparador de Jugadores — TIERS SF</title>

    <!-- Tipografías esports -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">

    <!-- Estilos TIERS SF -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header id="tiers-header">
    <h1 class="header-title">TIERS SF — COMPARADOR</h1>
    <p class="header-subtitle">Enfrentamiento directo entre jugadores</p>
    <div class="header-divider"></div>
</header>

<!-- 🔥 CONTROLES DEL COMPARADOR (A, NUEVA, B) -->
<div id="compareControls" style="display:flex; justify-content:center; gap:12px; margin-bottom:20px;">
    <button id="changeA" class="compare-btn">Cambiar A</button>
    <button id="newCompare" class="compare-btn">Nueva comparación</button>
    <button id="changeB" class="compare-btn">Cambiar B</button>
</div>
  
<div id="compareContainer" style="
    max-width:1100px;
    margin:30px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
">

    <!-- Jugador A -->
    <div id="playerA" class="compare-card"></div>

    <!-- VS -->
    <div style="
        font-family:'Orbitron';
        font-size:42px;
        color:var(--accent);
        text-shadow:0 0 18px rgba(0,170,255,0.6);
        margin:10px;
    ">
        VS
    </div>

    <!-- Jugador B -->
    <div id="playerB" class="compare-card"></div>

</div>
    
<div class="change-rival-container">
<div class="footer-links">
    <a href="index.html">🏆 Ranking</a>
    <a href="compare.html?id1=790702870286696468&id2=1452400465143922819">⚔️ Comparador</a>
    <a href="https://discord.gg/vsj3ZuGW8e">💬 Discord</a>
</div>
</div>
    

<footer id="tiers-footer-pro">
    <div class="footer-line"></div>

<div class="footer-links">
    <a href="index.html">🏆 Ranking</a>
    <a href="compare.html?id1=790702870286696468&id2=1452400465143922819">⚔️ Comparador</a>
    <a href="https://discord.gg/vsj3ZuGW8e">💬 Discord</a>
</div>

    <div class="footer-copy">
        TIERS SF © 2026 — Sistema competitivo no oficial de Superfighters Deluxe
    </div>
</footer>
    
<div id="rivalSelectorOverlay" class="overlay hidden">
  <div class="selector-box">
    <span id="closeSelector" style="position:absolute; top:10px; right:14px; cursor:pointer; font-size:20px;">✖</span>
<h2>Seleccionar rival</h2>
    <input
      type="text"
      id="rivalSearchInput"
      placeholder="Buscar jugador..."
      autocomplete="off"
    />
    <div id="rivalResults" class="results-list"></div>
  </div>
</div>

<script src="compare.js"></script>
</body>
    
</html>
