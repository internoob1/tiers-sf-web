<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comparador de Jugadores — TIERS SF</title>

    <!-- Tipografías esports -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">

    <!-- Estilos TIERS SF -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header id="tiers-header">
    <h1 class="header-title">TIERS SF — COMPARADOR</h1>
    <p class="header-subtitle">Enfrentamiento directo entre jugadores</p>
    <div class="header-divider"></div>
</header>

<div id="compareContainer" style="
    max-width:1100px;
    margin:30px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
">

    <!-- Jugador A -->
    <div id="playerA" class="compare-card"></div>

    <!-- VS -->
    <div style="
        font-family:'Orbitron';
        font-size:42px;
        color:var(--accent);
        text-shadow:0 0 18px rgba(0,170,255,0.6);
        margin:10px;
    ">
        VS
    </div>

    <!-- Jugador B -->
    <div id="playerB" class="compare-card"></div><

</div>
    
<div class="change-rival-container">
  <button id="changeRivalBtn">Cambiar rival</button>
</div>
    

<footer id="tiers-footer">
    TIERS SF © 2026 — Sistema competitivo no oficial de Superfighters Deluxe
</footer>

<script src="compare.js"></script>

</body>
</html>
